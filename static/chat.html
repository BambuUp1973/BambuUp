<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BambuUp Chat</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      background: #f7f7f7;
    }

    h1 {
      margin-bottom: 10px;
    }

    .chat-box {
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 16px;
      height: 500px;
      overflow-y: auto;
      margin-bottom: 16px;
    }

    .msg {
      margin-bottom: 4px;
      padding: 10px 12px;
      border-radius: 10px;
      max-width: 80%;
      white-space: pre-wrap;
    }

    .user {
      background: #dff1ff;
      margin-left: auto;
    }

    .bot {
      background: #ececec;
      margin-right: auto;
    }

    .msg-wrapper {
      margin-bottom: 12px;
    }

    .feedback-btn {
      display: inline-block;
      margin-top: 4px;
      font-size: 12px;
      padding: 3px 8px;
      background: transparent;
      color: #999;
      border: 1px solid #ddd;
      border-radius: 6px;
      cursor: pointer;
    }

    .feedback-btn:hover {
      color: #c00;
      border-color: #c00;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    input, textarea, button {
      font-size: 16px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    input {
      width: 200px;
    }

    textarea {
      flex: 1;
      resize: vertical;
      min-height: 80px;
    }

    button {
      cursor: pointer;
      background: black;
      color: white;
      border: none;
      padding: 12px 16px;
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    /* Modale feedback */
    #feedbackOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }

    #feedbackOverlay.open {
      display: flex;
    }

    #feedbackModal {
      background: white;
      border-radius: 12px;
      padding: 24px;
      width: 560px;
      max-width: 95vw;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #feedbackModal h2 {
      margin: 0 0 4px;
      font-size: 18px;
    }

    #feedbackModal label {
      font-size: 13px;
      color: #555;
      margin-bottom: 2px;
      display: block;
    }

    #feedbackModal textarea {
      width: 100%;
      box-sizing: border-box;
      font-size: 14px;
      resize: vertical;
      min-height: 70px;
      background: #f9f9f9;
    }

    #feedbackModal textarea.editable {
      background: white;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .modal-actions button.cancel {
      background: #eee;
      color: #333;
    }
  </style>
</head>
<body>
  <h1>BambuUp Internal Chat</h1>
  <p>Test interno del bot con memoria conversazionale.</p>

  <div class="controls">
    <input id="sender" type="text" value="Mauro" placeholder="Nome utente" />
    <input id="chatId" type="text" value="team001" placeholder="Chat ID" />
  </div>

  <div id="chatBox" class="chat-box"></div>

  <div class="row">
    <textarea id="message" placeholder="Scrivi un messaggio..."></textarea>
    <button onclick="sendMessage()">Invia</button>
  </div>

  <!-- Modale feedback -->
  <div id="feedbackOverlay">
    <div id="feedbackModal">
      <h2>Segnala risposta sbagliata</h2>

      <div>
        <label>Domanda</label>
        <textarea id="fbQuestion" readonly></textarea>
      </div>
      <div>
        <label>Risposta sbagliata del bot</label>
        <textarea id="fbWrong" readonly></textarea>
      </div>
      <div>
        <label>Risposta corretta (scrivi tu)</label>
        <textarea id="fbCorrect" class="editable" placeholder="Come avrebbe dovuto rispondere..."></textarea>
      </div>

      <div class="modal-actions">
        <button class="cancel" onclick="closeFeedbackModal()">Annulla</button>
        <button onclick="submitFeedback()">Invia feedback</button>
      </div>
    </div>
  </div>

  <script>
    let lastUserMessage = "";

    function addMessage(text, role) {
      const chatBox = document.getElementById("chatBox");
      const wrapper = document.createElement("div");
      wrapper.className = "msg-wrapper";

      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.textContent = text;
      wrapper.appendChild(div);

      if (role === "bot") {
        const capturedQuestion = lastUserMessage;
        const capturedReply = text;
        const btn = document.createElement("button");
        btn.className = "feedback-btn";
        btn.textContent = "👎 Risposta sbagliata";
        btn.onclick = () => openFeedbackModal(capturedQuestion, capturedReply);
        wrapper.appendChild(btn);
      } else {
        lastUserMessage = text;
      }

      chatBox.appendChild(wrapper);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function openFeedbackModal(question, wrongReply) {
      document.getElementById("fbQuestion").value = question;
      document.getElementById("fbWrong").value = wrongReply;
      document.getElementById("fbCorrect").value = "";
      document.getElementById("feedbackOverlay").classList.add("open");
      document.getElementById("fbCorrect").focus();
    }

    function closeFeedbackModal() {
      document.getElementById("feedbackOverlay").classList.remove("open");
    }

    async function submitFeedback() {
      const question = document.getElementById("fbQuestion").value;
      const wrongReply = document.getElementById("fbWrong").value;
      const correctReply = document.getElementById("fbCorrect").value.trim();

      if (!correctReply) {
        alert("Inserisci la risposta corretta prima di inviare.");
        return;
      }

      try {
        await fetch("/feedback", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            question: question,
            wrong_reply: wrongReply,
            correct_reply: correctReply
          })
        });
        closeFeedbackModal();
      } catch (e) {
        alert("Errore nell'invio del feedback.");
      }
    }

    // Chiudi modale cliccando fuori
    document.getElementById("feedbackOverlay").addEventListener("click", function(e) {
      if (e.target === this) closeFeedbackModal();
    });

    async function sendMessage() {
      const sender = document.getElementById("sender").value.trim();
      const chatId = document.getElementById("chatId").value.trim();
      const messageEl = document.getElementById("message");
      const message = messageEl.value.trim();

      if (!sender || !chatId || !message) return;

      addMessage(message, "user");
      messageEl.value = "";

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            source: "web",
            sender: sender,
            chat_id: chatId,
            message: message
          })
        });

        const data = await response.json();
        addMessage(data.reply || "Errore nella risposta del bot.", "bot");
      } catch (error) {
        addMessage("Errore di connessione al server.", "bot");
      }
    }
  </script>
</body>
</html>
